services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: clorn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clorn}
      POSTGRES_DB: clorn
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clorn"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://clorn:${POSTGRES_PASSWORD:-clorn}@db:5432/clorn

volumes:
  pgdata:
